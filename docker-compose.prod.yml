name: hexastudio

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

services:
  # ---------------------------------------------------------------------------
  # Reverse Proxy
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v2.11
    <<: *default-restart
    logging: *default-logging
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
    environment:
      CLOUDFLARE_EMAIL: ${CLOUDFLARE_EMAIL:?CLOUDFLARE_EMAIL is required}
      CLOUDFLARE_API_KEY: ${CLOUDFLARE_API_KEY:?CLOUDFLARE_API_KEY is required}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_certs:/letsencrypt
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-dashboard.rule=Host(`${TRAEFIK_DASHBOARD_HOST:-traefik.hexastudio.net}`)
      - traefik.http.routers.traefik-dashboard.service=api@internal
      - traefik.http.routers.traefik-dashboard.entrypoints=web
      - traefik.http.routers.traefik-dashboard.middlewares=traefik-auth@file

  # ---------------------------------------------------------------------------
  # Cloudflare Tunnel (no public IP required)
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    <<: *default-restart
    logging: *default-logging
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    networks:
      - web
      - internal

  # ---------------------------------------------------------------------------
  # Data Stores (internal network only — no public ports)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    <<: *default-restart
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hexastudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-hexastudio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hexastudio} -d ${POSTGRES_DB:-hexastudio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    <<: *default-restart
    logging: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Object Storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    <<: *default-restart
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hexastudio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    networks:
      - web
      - internal
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/9000 && exit 0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - com.centurylinklabs.watchtower.enable=true

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hexastudio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    entrypoint: /bin/sh
    command: /scripts/init-buckets.sh
    volumes:
      - ./docker/minio/init-buckets.sh:/scripts/init-buckets.sh:ro
    networks:
      - internal
    restart: "no"

  # ---------------------------------------------------------------------------
  # Vector Store (Qdrant)
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    <<: *default-restart
    logging: *default-logging
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal
    expose:
      - "6333"
      - "6334"

  # ---------------------------------------------------------------------------
  # Applications
  # ---------------------------------------------------------------------------
  backend:
    container_name: hexa-backend-${SOT:-blue}
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    <<: *default-restart
    logging: *default-logging
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-hexastudio}:${POSTGRES_PASSWORD}@postgres:5432/hexastudio_api
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      SENTRY_DSN: ${SENTRY_DSN:-}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-hexastudio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: "false"
      CMS_URL: ${CMS_URL:-http://cms:1337}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hexastudio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ODOO_HOST: ${ODOO_HOST:-odoo}
      ODOO_PORT: ${ODOO_PORT:-8069}
      ODOO_DB: ${ODOO_DB:-hexastudio_odoo}
      ODOO_DB_USER: ${ODOO_DB_USER:-admin}
      ODOO_DB_PASSWORD: ${ODOO_DB_PASSWORD:-admin}
      ODOO_USER: ${ODOO_USER:-admin}
      ODOO_PASSWORD: ${ODOO_PASSWORD:?ODOO_PASSWORD is required}
      ODOO_MASTER_PASSWORD: ${ODOO_MASTER_PASSWORD:?ODOO_MASTER_PASSWORD is required}
      ODOO_WEBHOOK_SECRET: ${ODOO_WEBHOOK_SECRET:?ODOO_WEBHOOK_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - web
      - internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    container_name: hexa-frontend-${SOT:-blue}
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api.localhost}
        NEXT_PUBLIC_CMS_URL: ${NEXT_PUBLIC_CMS_URL:-http://cms.localhost}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    <<: *default-restart
    logging: *default-logging
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - backend
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cms:
    container_name: hexa-cms-${SOT:-blue}
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    <<: *default-restart
    logging: *default-logging
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: 0.0.0.0
      PORT: ${STRAPI_PORT:-1337}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: hexastudio_cms
      DATABASE_USERNAME: ${POSTGRES_USER:-hexastudio}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_SSL: "false"
      CMS_URL: ${CMS_URL:-http://cms:1337}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hexastudio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      DATABASE_URL: postgresql://${POSTGRES_USER:-hexastudio}:${POSTGRES_PASSWORD}@postgres:5432/hexastudio_cms
      APP_KEYS: ${STRAPI_APP_KEYS:?STRAPI_APP_KEYS is required}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT:?STRAPI_API_TOKEN_SALT is required}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET:?STRAPI_ADMIN_JWT_SECRET is required}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT:?STRAPI_TRANSFER_TOKEN_SALT is required}
      JWT_SECRET: ${STRAPI_JWT_SECRET:?STRAPI_JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - cms_uploads:/opt/app/public/uploads
    networks:
      - web
      - internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:1337/_health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Odoo ERP
  # ---------------------------------------------------------------------------
  odoo:
    image: odoo:17.0
    <<: *default-restart
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: postgres
      PORT: 5432
      USER: ${POSTGRES_USER:-hexastudio}
      PASSWORD: ${POSTGRES_PASSWORD}
      DBNAME: ${ODOO_DB:-hexastudio_odoo}
    volumes:
      - odoo_data:/var/lib/odoo
      - ./docker/odoo/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./docker/odoo/addons:/mnt/extra-addons:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.odoo.rule=Host(`${ODOO_HOST:-odoo.localhost}`)
      - traefik.http.routers.odoo.entrypoints=web
      - traefik.http.routers.odoo.service=odoo
      - traefik.http.services.odoo.loadbalancer.server.port=8069
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - web
      - internal

  # ---------------------------------------------------------------------------
  # Monitoring
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    <<: *default-restart
    logging: *default-logging
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - web
      - internal

  grafana:
    image: grafana/grafana:11.3.0
    <<: *default-restart
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      CMS_URL: ${CMS_URL:-http://cms:1337}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hexastudio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      GF_SERVER_ROOT_URL: https://${GRAFANA_HOST:-grafana.hexastudio.net}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - web
      - internal

  loki:
    image: grafana/loki:3.2.1
    <<: *default-restart
    logging: *default-logging
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - internal

  promtail:
    image: grafana/promtail:3.2.1
    <<: *default-restart
    logging: *default-logging
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./docker/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - internal

  node-exporter:
    image: prom/node-exporter:v1.8.2
    <<: *default-restart
    logging: *default-logging
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Auto-updates & Backups
  # ---------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:latest
    <<: *default-restart
    logging: *default-logging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCHEDULE: "0 0 6 * * *"
      WATCHTOWER_LABEL_ENABLE: "true"
      DOCKER_API_VERSION: "1.40"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  backup:
    image: postgres:16-alpine
    <<: *default-restart
    logging: *default-logging
    entrypoint: /bin/sh
    command: /scripts/backup.sh
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-hexastudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hexastudio}
      MINIO_ENDPOINT: minio
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-hexastudio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      BACKUP_DIR: /backups
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./docker/backup/backup.sh:/scripts/backup.sh:ro
      - backup_data:/backups
    networks:
      - web
      - internal

  backup-verify:
    image: postgres:16-alpine
    logging: *default-logging
    profiles:
      - verify  # Run manually: docker compose --profile verify run backup-verify
    entrypoint: /bin/sh
    command: /scripts/verify-backup.sh
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-hexastudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
    volumes:
      - ./docker/backup/verify-backup.sh:/scripts/verify-backup.sh:ro
      - backup_data:/backups:ro
    networks:
      - internal

networks:
  web:
    name: hexastudio_web
  internal:
    name: hexastudio_internal
    internal: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
  cms_uploads:
  traefik_certs:
  prometheus_data:
  grafana_data:
  loki_data:
  odoo_data:
  backup_data:
  qdrant_data:
