name: CI

on:
  push:
    branches: [main, stage]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: echo "SKIP_ENV_VALIDATION=true" >> $GITHUB_ENV
      - run: npm run typecheck --workspace=packages/types
      - run: npm run typecheck --workspace=packages/ui
      - run: npm run typecheck --workspace=packages/utils
      - run: npm run typecheck --workspace=apps/frontend
      - run: npm run typecheck --workspace=apps/backend

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint --workspace=apps/backend
      - run: npm run lint --workspace=apps/frontend

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run test --workspace=apps/backend
      - run: npm run test --workspace=packages/ui

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: echo "SKIP_ENV_VALIDATION=true" >> $GITHUB_ENV
      - run: npm run build --workspace=packages/types
      - run: npm run build --workspace=packages/utils
      - run: npm run build --workspace=apps/frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.hexastudio.net
          NEXT_PUBLIC_CMS_URL: https://cms.hexastudio.net
          NEXT_PUBLIC_SITE_URL: https://hexastudio.net
      - run: npm run build --workspace=apps/backend

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx playwright install --with-deps chromium
      - run: npm run build --workspace=apps/frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.hexastudio.net
          NEXT_PUBLIC_CMS_URL: https://cms.hexastudio.net
          NEXT_PUBLIC_SITE_URL: https://hexastudio.net
          SKIP_ENV_VALIDATION: true
      - run: npm run test:e2e --workspace=apps/frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
