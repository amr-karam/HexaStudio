name: CI

on:
  push:
    branches: [main, stage]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: echo "SKIP_ENV_VALIDATION=true" >> $GITHUB_ENV
      - run: npm run typecheck --workspace=packages/types
      - run: npm run typecheck --workspace=packages/ui
      - run: npm run typecheck --workspace=packages/utils
      - run: npm run typecheck --workspace=apps/frontend
      - run: npm run typecheck --workspace=apps/backend

  cms-typecheck:
    name: CMS TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/cms/package-lock.json
      - run: npm ci --legacy-peer-deps
        working-directory: apps/cms
      - run: npm run typecheck
        working-directory: apps/cms

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint --workspace=apps/backend
      - run: npm run lint --workspace=apps/frontend

  security-scan:
    name: Security Scan (Snyk + npm audit)
    runs-on: ubuntu-latest
    env:
      # Lift the secret to job scope so step-level `if` can gate on its presence
      # (the `secrets` context is not available in step `if` conditionals).
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: npm audit (high+ blockers)
        run: npm audit --audit-level=high
      - name: Warn when Snyk token is unavailable
        if: env.SNYK_TOKEN == ''
        run: echo "::warning::SNYK_TOKEN is not configured; skipping Snyk SCA/SAST scans. Configure the secret to enforce high-severity SAST/SCA gating."
      - name: Snyk Open Source (SCA)
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@master
        with:
          # No continue-on-error: a high-severity finding must fail the job.
          args: --severity-threshold=high
      - name: Snyk Code (SAST)
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@master
        with:
          # No continue-on-error: a high-severity finding must fail the job.
          command: code test
          args: --severity-threshold=high

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run test --workspace=apps/backend
      - run: npm run test --workspace=apps/frontend
      - run: npm run test --workspace=packages/ui

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: echo "SKIP_ENV_VALIDATION=true" >> $GITHUB_ENV
      - run: npm run build --workspace=packages/types
      - run: npm run build --workspace=packages/utils
      - run: npm run build --workspace=apps/frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.hexastudio.net
          NEXT_PUBLIC_CMS_URL: https://cms.hexastudio.net
          NEXT_PUBLIC_SITE_URL: https://hexastudio.net
      - run: npm run build --workspace=apps/backend

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx playwright install --with-deps chromium
      - run: npm run build --workspace=apps/frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.hexastudio.net
          NEXT_PUBLIC_CMS_URL: https://cms.hexastudio.net
          NEXT_PUBLIC_SITE_URL: https://hexastudio.net
          SKIP_ENV_VALIDATION: true
      - run: npm run test:e2e --workspace=apps/frontend
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx playwright install --with-deps chromium
      - run: npm run build --workspace=apps/frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.hexastudio.net
          NEXT_PUBLIC_CMS_URL: https://cms.hexastudio.net
          NEXT_PUBLIC_SITE_URL: https://hexastudio.net
          SKIP_ENV_VALIDATION: true
      - name: Run visual regression tests (update baselines on first run)
        run: npx playwright test --config=e2e/playwright.config.ts --project=visual-regression --update-snapshots
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-regression-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build frontend
        run: npm run build --workspace=apps/frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.hexastudio.net
          NEXT_PUBLIC_CMS_URL: https://cms.hexastudio.net
          NEXT_PUBLIC_SITE_URL: https://hexastudio.net
          SKIP_ENV_VALIDATION: true
      - name: Copy static assets for standalone build
        run: |
          cp -r apps/frontend/.next/static apps/frontend/.next/standalone/apps/frontend/.next/static || true
          cp -r apps/frontend/public apps/frontend/.next/standalone/apps/frontend/public || true
      - name: Run Lighthouse CI
        run: npx lhci autorun --config=lighthouserc.json
        env:
          CI: true
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bundle-analysis:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build frontend with bundle analysis
        run: npm run analyze --workspace=apps/frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.hexastudio.net
          NEXT_PUBLIC_CMS_URL: https://cms.hexastudio.net
          NEXT_PUBLIC_SITE_URL: https://hexastudio.net
          SKIP_ENV_VALIDATION: true
      - name: Upload bundle analysis report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: apps/frontend/.next/analyze/
          retention-days: 7
      - name: Bundle size check
        run: |
          # Check for bundles > 250KB
          find apps/frontend/.next/analyze -name "*.html" -exec grep -l "bundle" {} \; | while read file; do
            size=$(grep -oP '(?<=<td>)[0-9.]+(?= KB)' "$file" | sort -rn | head -1)
            if [ -n "$size" ] && [ "$(echo "$size > 250" | bc -l)" -eq 1 ]; then
              echo "::warning file=$file::Bundle size ${size}KB exceeds 250KB threshold"
            fi
          done
