name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "HEXA-Vision-Playbook/**"

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.hexastudio.net
            NEXT_PUBLIC_CMS_URL=https://cms.hexastudio.net
            NEXT_PUBLIC_SITE_URL=https://hexastudio.net
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push CMS
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/cms/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/cms:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/cms:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1
        with:
          host: 19.16.1.100
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/hexastudio
            # Copy deployment script from repo to server (assuming it's already there via git pull)
            # Since we are in a GitHub Action, the repo is checked out. 
            # We can use scp or just write the script to the server.
            # For now, we assume the script is committed to the repo and pulled.
            git pull origin main
            bash scripts/deploy-zero-downtime.sh
            docker image prune -f
