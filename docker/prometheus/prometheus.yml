global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"
  - "loki-alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: traefik
    static_configs:
      - targets: ["traefik:8080"]

  - job_name: backend
    metrics_path: /api/metrics
    static_configs:
      - targets: ["backend:4000"]

  - job_name: frontend
    metrics_path: /_metrics
    static_configs:
      - targets: ["frontend:3000"]

  - job_name: cms
    static_configs:
      - targets: ["cms:1337"]

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]

  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: minio
    static_configs:
      - targets: ["minio:9000"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
