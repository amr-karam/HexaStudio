http:
  routers:
    # Main Website
    website:
      rule: "Host(`hexastudio.net`)"
      service: frontend
      tls: { certResolver: letsencrypt }

    # Odoo ERP
    odoo:
      rule: "Host(`odoo.hexastudio.net`)"
      service: odoo
      tls: { certResolver: letsencrypt }

    # Backend API
    api:
      rule: "Host(`api.hexastudio.net`)"
      service: backend
      tls: { certResolver: letsencrypt }

    # CMS
    cms:
      rule: "Host(`cms.hexastudio.net`)"
      service: cms
      tls: { certResolver: letsencrypt }

    # Storage / Files
    files:
      rule: "Host(`files.hexastudio.net`)"
      service: minio
      tls: { certResolver: letsencrypt }

    # Storage Console
    files-console:
      rule: "Host(`files-console.hexastudio.net`)"
      service: minio-console
      tls: { certResolver: letsencrypt }

    # Monitoring (Grafana)
    monitor:
      rule: "Host(`monitor.hexastudio.net`)"
      service: grafana
      tls: { certResolver: letsencrypt }

    # Monitoring (Prometheus)
    prometheus:
      rule: "Host(`prometheus.hexastudio.net`)"
      service: prometheus
      tls: { certResolver: letsencrypt }

    # Uptime
    uptime:
      rule: "Host(`uptime.hexastudio.net`)"
      service: uptime-kuma
      tls: { certResolver: letsencrypt }

    # AI Services
    ai:
      rule: "Host(`ai.hexastudio.net`)"
      service: ai-service
      tls: { certResolver: letsencrypt }

    # Auth
    auth:
      rule: "Host(`auth.hexastudio.net`)"
      service: auth-service
      tls: { certResolver: letsencrypt }

    # Analytics
    analytics:
      rule: "Host(`analytics.hexastudio.net`)"
      service: analytics-service
      tls: { certResolver: letsencrypt }

    # Communication Hub
    hub:
      rule: "Host(`hub.hexastudio.net`)"
      service: hub-service
      tls: { certResolver: letsencrypt }

    # Documentation
    docs:
      rule: "Host(`docs.hexastudio.net`)"
      service: docs-service
      tls: { certResolver: letsencrypt }

    # Status Page
    status:
      rule: "Host(`status.hexastudio.net`)"
      service: status-service
      tls: { certResolver: letsencrypt }

  services:
    frontend:
      loadBalancer:
        servers: [{ url: "http://frontend:3000" }]
    backend:
      loadBalancer:
        servers: [{ url: "http://backend:4000" }]
    cms:
      loadBalancer:
        servers: [{ url: "http://cms:1337" }]
    odoo:
      loadBalancer:
        servers: [{ url: "http://odoo:8069" }]
    minio:
      loadBalancer:
        servers: [{ url: "http://minio:9000" }]
    minio-console:
      loadBalancer:
        servers: [{ url: "http://minio-console:9001" }]
    grafana:
      loadBalancer:
        servers: [{ url: "http://grafana:3000" }]
    prometheus:
      loadBalancer:
        servers: [{ url: "http://prometheus:9090" }]
    uptime-kuma:
      loadBalancer:
        servers: [{ url: "http://uptime-kuma:3001" }]
    ai-service:
      loadBalancer:
        servers: [{ url: "http://ai-service:8080" }]
    auth-service:
      loadBalancer:
        servers: [{ url: "http://auth-service:8080" }]
    analytics-service:
      loadBalancer:
        servers: [{ url: "http://analytics-service:8080" }]
    hub-service:
      loadBalancer:
        servers: [{ url: "http://hub-service:8080" }]
    docs-service:
      loadBalancer:
        servers: [{ url: "http://docs-service:8080" }]
    status-service:
      loadBalancer:
        servers: [{ url: "http://status-service:8080" }]
