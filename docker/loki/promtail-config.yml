server:
  http_listen_port: 9080
  grpc_listen_port: 9081

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchsize: 102400
    batchwait: 1s
    timeout: 10s
    backoff_config:
      min_period: 1s
      max_period: 30s
      max_retries: 10

scrape_configs:
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      - json:
          expressions:
            container: container_name
            stream: stream
            log: log
      - regex:
          expression: '^(?P<time>\S+) (?P<level>\w+) (?P<message>.*)$'
      - labels:
          level:
          container:
      - timestamp:
          source: time
          format: RFC3339Nano
      - drop:
          - time

  - job_name: backend-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: backend
          app: hexastudio-backend
        __path__: /var/log/backend/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
            context: context
            trace: trace
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339

  - job_name: frontend-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: frontend
          app: hexastudio-frontend
        __path__: /var/log/frontend/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
            route: route
            user_id: userId
      - labels:
          level:
          route:
      - timestamp:
          source: timestamp
          format: RFC3339

  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          type: access
        __path__: /var/log/nginx/access.log

    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<request>[^"]+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'
      - labels:
          status:
      - timestamp:
          source: time_local
          format: "02/Jan/2006:15:04:05 -0700"

  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          type: error
        __path__: /var/log/nginx/error.log

    pipeline_stages:
      - regex:
          expression: '^(?P<time_local>[^\]]+) \[(?P<level>\w+)\] (?P<pid>\d+)#(?P<tid>\d+): (?P<message>.*)'
      - labels:
          level:
      - timestamp:
          source: time_local
          format: "02/Jan/2006:15:04:05"